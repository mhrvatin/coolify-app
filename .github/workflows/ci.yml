# CI for coolify-app.
#
# Shared building blocks (docs-only-skip, committer-check, biome-lint,
# bun-build, ci-ok-gate) come from mhrvatin/common-ci@v1. The test job (bun
# test + a dist/ freshness check) stays local since it isn't generic enough
# to share yet.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
      changed_files: ${{ steps.detect.outputs.changed-files }}
    steps:
      - id: detect
        uses: mhrvatin/common-ci/actions/docs-only-skip@08851a30e665ea3d3cadf7c007562e0d188d15a5 # v1

  committer-check:
    name: Committer identity
    runs-on: ubuntu-latest
    steps:
      - uses: mhrvatin/common-ci/actions/committer-check@08851a30e665ea3d3cadf7c007562e0d188d15a5 # v1
        with:
          expected-name: Marcus Hrvatin
          expected-email: github.com@hrvatin.se

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: mhrvatin/common-ci/actions/biome-lint@08851a30e665ea3d3cadf7c007562e0d188d15a5 # v1
        with:
          bun-version: ${{ env.BUN_VERSION }}
          files: ${{ needs.changes.outputs.changed_files }}

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: mhrvatin/common-ci/actions/bun-build@08851a30e665ea3d3cadf7c007562e0d188d15a5 # v1
        with:
          bun-version: ${{ env.BUN_VERSION }}
          packages: coolify-app
          scope: '@mhrvatin/'

  test:
    name: Test + dist freshness
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun test
      - name: Verify committed dist/ matches src/
        run: |
          bun run build
          git diff --exit-code dist || {
            echo "::error::dist/ is stale — run 'bun run build' and commit the result."
            exit 1
          }

  ci-ok:
    name: CI OK
    if: always()
    needs: [changes, committer-check, lint, build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: mhrvatin/common-ci/actions/ci-ok-gate@08851a30e665ea3d3cadf7c007562e0d188d15a5 # v1
        with:
          always-required: '{"committer-check":"${{ needs.committer-check.result }}","changes":"${{ needs.changes.result }}"}'
          skippable: '{"lint":"${{ needs.lint.result }}","build":"${{ needs.build.result }}","test":"${{ needs.test.result }}"}'
          skip: ${{ needs.changes.outputs.code == 'false' }}
